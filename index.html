<!DOCTYPE html>
<html>
<head>
  <title>My Gym System</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 20px;
    }

    button, select {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    .card {
      background: #1e1e1e;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .btn { background: #00c853; color: white; cursor: pointer; }
    .video { background: #2979ff; color: white; }
    .warmup { background: #ff9800; color: black; }
  </style>
</head>

<body>

<h1>🏋️ My 5-Day Gym System</h1>

<select id="day" onchange="loadDay()">
  <option>Sunday - Chest + Triceps</option>
  <option>Monday - Back + Biceps</option>
  <option>Tuesday - Legs + Abs</option>
  <option>Wednesday - Shoulders + Arms</option>
  <option>Friday - Upper + Abs</option>
</select>

<div id="workout"></div>

<script>

const warmup = [
  ["Treadmill", 300],
  ["Stairmaster", 300]
];

// 🎥 REAL VIDEO LINKS (specific tutorials)
const program = {
"Sunday - Chest + Triceps": [
  ["Dumbbell Bench Press", 90, "https://www.youtube.com/watch?v=VmB1G1K7v94"],
  ["Incline Dumbbell Press", 90, "https://www.youtube.com/watch?v=8iPEnn-ltC8"],
  ["Cable Chest Fly", 60, "https://www.youtube.com/watch?v=eozdVDA78K0"],
  ["Triceps Pushdown", 60, "https://www.youtube.com/watch?v=2-LAMcpzODU"],
  ["Assisted Dip Machine", 90, "https://www.youtube.com/watch?v=6kALZikXxLc"]
],

"Monday - Back + Biceps": [
  ["Lat Pulldown", 90, "https://www.youtube.com/watch?v=CAwf7n6Luuc"],
  ["Seated Row Machine", 90, "https://www.youtube.com/watch?v=GZbfZ033f74"],
  ["Chest Supported Row", 90, "https://www.youtube.com/watch?v=vT2GjY_Umpw"],
  ["Face Pull", 60, "https://www.youtube.com/watch?v=rep-qVOkqgk"],
  ["Dumbbell Curl", 60, "https://www.youtube.com/watch?v=ykJmrZ5v0Oo"],
  ["Hammer Curl", 60, "https://www.youtube.com/watch?v=zC3nLlEvin4"]
],

"Tuesday - Legs + Abs": [
  ["Barbell Squat", 120, "https://www.youtube.com/watch?v=Dy28eq2PjcM"],
  ["Leg Press", 90, "https://www.youtube.com/watch?v=IZxyjW7MPJQ"],
  ["Leg Curl", 60, "https://www.youtube.com/watch?v=1Tq3QdYUuHs"],
  ["Calf Raises", 60, "https://www.youtube.com/watch?v=-M4-G8p8fmc"],
  ["Hanging Knee Raises", 60, "https://www.youtube.com/watch?v=flmMq7g9V3w"],
  ["Cable Crunch", 60, "https://www.youtube.com/watch?v=AV5PmZJIrrw"],
  ["Plank", 60, "https://www.youtube.com/watch?v=pSHjTRCQxIw"]
],

"Wednesday - Shoulders + Arms": [
  ["Lateral Raises", 60, "https://www.youtube.com/watch?v=3VcKaXpzqRo"],
  ["Cable Lateral Raise", 60, "https://www.youtube.com/watch?v=3VcKaXpzqRo"],
  ["Face Pull", 60, "https://www.youtube.com/watch?v=rep-qVOkqgk"],
  ["Dumbbell Front Raise", 60, "https://www.youtube.com/watch?v=-t7fuZ0KhDA"],
  ["Dumbbell Curl", 60, "https://www.youtube.com/watch?v=ykJmrZ5v0Oo"],
  ["Triceps Pushdown", 60, "https://www.youtube.com/watch?v=2-LAMcpzODU"]
],

"Friday - Upper + Abs": [
  ["Incline Dumbbell Press", 90, "https://www.youtube.com/watch?v=8iPEnn-ltC8"],
  ["Lat Pulldown", 90, "https://www.youtube.com/watch?v=CAwf7n6Luuc"],
  ["Dumbbell Bench Press", 90, "https://www.youtube.com/watch?v=VmB1G1K7v94"],
  ["Cable Chest Fly", 60, "https://www.youtube.com/watch?v=eozdVDA78K0"],
  ["Cable Curl", 60, "https://www.youtube.com/watch?v=kwG2ipFRgfo"],
  ["Triceps Pushdown", 60, "https://www.youtube.com/watch?v=2-LAMcpzODU"],
  ["Cable Crunch", 60, "https://www.youtube.com/watch?v=AV5PmZJIrrw"],
  ["Plank", 60, "https://www.youtube.com/watch?v=pSHjTRCQxIw"]
]
};

let timer;

function loadDay() {
  const day = document.getElementById("day").value;
  const workoutDiv = document.getElementById("workout");
  workoutDiv.innerHTML = "";

  workoutDiv.innerHTML += `<h2>🟡 Warmup</h2>`;

  warmup.forEach(w => {
    workoutDiv.innerHTML += `
      <div class="card">
        <h3>${w[0]} - 5 min</h3>
        <button class="warmup" onclick="startTimer(${w[1]})">
          Start Warmup
        </button>
      </div>
    `;
  });

  workoutDiv.innerHTML += `<h2>🔥 Workout</h2>`;

  program[day].forEach(ex => {
    workoutDiv.innerHTML += `
      <div class="card">
        <h3>${ex[0]}</h3>

        <button class="btn" onclick="startTimer(${ex[1]})">
          Rest Timer (${ex[1]}s)
        </button>

        <button class="video" onclick="window.open('${ex[2]}')">
          Watch Form Video
        </button>
      </div>
    `;
  });
}

function startTimer(seconds) {
  clearInterval(timer);
  let t = seconds;

  let display = document.createElement("div");
  display.style.color = "#ffcc00";
  display.style.margin = "10px 0";
  display.innerHTML = "Timer: " + t + "s";

  document.body.appendChild(display);

  timer = setInterval(() => {
    t--;
    display.innerHTML = "Timer: " + t + "s";

    if (t <= 0) {
      clearInterval(timer);
      display.innerHTML = "🔥 DONE";
      alert("Next set!");
    }
  }, 1000);
}

loadDay();

</script>

</body>
</html>
